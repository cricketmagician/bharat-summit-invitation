<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Electricity Summit 2026 | Official Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-canvas-container"></div>
    <div class="grid-overlay"></div>
    <div class="bloom-effect"></div>

    <div class="floating-icons-container" id="icons-layer"></div>

    <main class="experience-container" id="experience">
        <!-- Cover Card State -->
        <div class="cover-card" id="cover">
            <div class="cover-glow"></div>
            <div class="logos-wrapper">
                <img src="assets/summit_logo.png" alt="Summit Logo" class="cover-logo-main">
                <img src="assets/kpil_logo.png" alt="KPIL Logo" class="cover-logo-sub">
            </div>
            <button class="open-btn" id="open-btn">
                <span>Open Invitation</span>
                <div class="btn-glow"></div>
            </button>
        </div>

        <!-- Hidden content that reveals -->
        <div class="invitation-reveal" id="invitation">
            <div class="invitation-card">
                <div class="reveal-glow-bar"></div>
                <div class="card-glow"></div>
                <div class="card-content">
                    <header>
                        <img src="assets/summit_logo.png" alt="Summit Logo" class="summit-logo">
                        <p class="subtitle">Cordially Invites You</p>
                    </header>
                    
                    <div class="divider"></div>
                    
                    <div class="date-section">
                        <h2 class="date-range">19 – 22 March 2026</h2>
                    </div>

                    <div class="theme-section">
                        <p class="theme-label">Theme</p>
                        <h2 class="theme-text">Powering a Clean Future</h2>
                    </div>
                    
                    <div class="description-section">
                        <p>A four-day global electricity industry event held under the patronage of the <strong>Ministry of Power</strong>, Government of India.</p>
                    </div>
                    
                    <div class="event-details">
                        <div class="detail-item">
                            <span class="label">Hall No</span>
                            <span class="value">01</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Stall No</span>
                            <span class="value">A-12</span>
                        </div>
                    </div>
                    
                    <div class="venue-section">
                        <h3 class="venue-title">Venue</h3>
                        <p class="venue-name">Yashobhoomi Convention Centre</p>
                        <p class="venue-location">Dwarka, New Delhi, India</p>
                    </div>
                    
                    <div class="card-footer">
                        <img src="assets/kpil_logo.png" alt="KPIL Logo" class="kpil-logo">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
